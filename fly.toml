app = "new-pawnshop-api"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8888"
  CORS_ALLOW_VERCEL_PREVIEWS = "true"
  CORS_ALLOW_RENDER_PREVIEWS = "false"
  ENABLE_API_DOCS = "false"

[http_service]
  internal_port = 8888
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "get"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
